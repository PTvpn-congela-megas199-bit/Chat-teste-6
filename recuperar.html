<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha</title>
    <style>
        body { background: #0a192f; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .card { background: #112240; padding: 30px; border-radius: 20px; width: 90%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; border: none; background: #0a192f; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-main { background: #64ffda; color: #0a192f; }
        .btn-voltar { background: transparent; border: 1px solid #64ffda; color: #64ffda; }
        .toast { position: fixed; top: 20px; right: 20px; background: #64ffda; color: #0a192f; padding: 15px; border-radius: 10px; animation: slide 0.5s; }
        @keyframes slide { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="card">
        <h2>Recuperar Senha</h2>
        <p style="font-size: 14px; color: #8892b0;">Digite seu e-mail para receber o link de redefinição.</p>
        <input type="email" id="email" placeholder="Seu e-mail">
        <button class="btn-main" onclick="enviar()">Enviar Link</button>
        <button class="btn-voltar" onclick="window.location.href='login.html'">Voltar para o Login</button>
    </div>

    <script type="module">
    
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
import { getDatabase } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCfMaQ2N5b8KHdAjX11tXVc3kakNQkVhMg",
  authDomain: "base-de-dados-8060d.firebaseapp.com",
  databaseURL: "https://base-de-dados-8060d-default-rtdb.firebaseio.com",
  projectId: "base-de-dados-8060d",
  storageBucket: "base-de-dados-8060d.firebasestorage.app",
  messagingSenderId: "91146907783",
  appId: "1:91146907783:web:e7b28d3282152d19184822"
};

const app = initializeApp(firebaseConfig);
export const auth = getAuth(app);
export const db = getFirestore(app);
export const rtdb = getDatabase(app);


        import { auth } from './config.js';
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        
        window.enviar = () => {
            const email = document.getElementById('email').value;
            sendPasswordResetEmail(auth, email)
            .then(() => {
                mostrarMensagem("Link enviado com sucesso! Verifique seu e-mail.");
            })
            .catch(e => mostrarMensagem(e.message));
        };

        function mostrarMensagem(msg) {
            const div = document.createElement('div');
            div.className = 'toast';
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }
    </script>
</body>
</html>
