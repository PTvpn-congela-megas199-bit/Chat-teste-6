<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body { background: #0a192f; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .card { background: #112240; padding: 25px; border-radius: 20px; width: 90%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: none; background: #0a192f; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .btn-entrar { background: #64ffda; color: #0a192f; }
        .btn-google { background: white; color: #333; }
        .link { color: #64ffda; text-decoration: none; font-size: 14px; }
        .toast { position: fixed; top: 20px; right: 20px; background: #ff4757; color: white; padding: 15px; border-radius: 10px; animation: slide 0.5s; }
        @keyframes slide { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="card">
        <h2>Bem-vindo</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha">
        <button class="btn-entrar" onclick="logar()">Entrar</button>
        <button class="btn-google" onclick="loginGoogle()">Entrar com Google</button>
        <p><a href="recuperar.html" class="link">Esqueci minha senha</a></p>
        <p>Ainda não tem conta? <a href="register.html" class="link">Registre-se</a></p>
    </div>

    <script type="module">
    
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
import { getDatabase } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCfMaQ2N5b8KHdAjX11tXVc3kakNQkVhMg",
  authDomain: "base-de-dados-8060d.firebaseapp.com",
  databaseURL: "https://base-de-dados-8060d-default-rtdb.firebaseio.com",
  projectId: "base-de-dados-8060d",
  storageBucket: "base-de-dados-8060d.firebasestorage.app",
  messagingSenderId: "91146907783",
  appId: "1:91146907783:web:e7b28d3282152d19184822"
};

const app = initializeApp(firebaseConfig);
export const auth = getAuth(app);
export const db = getFirestore(app);
export const rtdb = getDatabase(app);


        import { auth } from './config.js';
        import { signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        
        window.logar = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value)
            .then(() => window.location.href = "home.html")
            .catch(e => mostrarErro(e.message));
        };

        window.loginGoogle = () => {
            signInWithPopup(auth, new GoogleAuthProvider())
            .then(() => window.location.href = "home.html")
            .catch(e => mostrarErro(e.message));
        };

        function mostrarErro(msg) {
            const div = document.createElement('div'); div.className = 'toast'; div.innerText = msg;
            document.body.appendChild(div); setTimeout(() => div.remove(), 3000);
        }
    </script>
</body>
</html>
